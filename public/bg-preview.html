<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宇宙星系背景预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 400px 400px;
      gap: 8px;
      padding: 8px;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
    }
    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card h3 {
      position: relative;
      z-index: 1;
      color: white;
      font-size: 20px;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      margin-bottom: 4px;
    }
    .card .desc {
      position: relative;
      z-index: 1;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 280px;
    }

    /* ========== 方案 A: 多层星云渐变 (CSS only) ========== */
    .bg-a {
      background:
        radial-gradient(ellipse 80% 60% at 30% 20%, rgba(138, 43, 226, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 70% 60%, rgba(0, 150, 255, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 80%, rgba(255, 0, 128, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 70% 70% at 50% 50%, rgba(30, 20, 80, 0.8) 0%, #050510 100%);
    }
    .bg-a::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 25% 25%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(200,220,255,0.8), transparent),
        radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,240,200,0.7), transparent),
        radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 15% 60%, rgba(200,200,255,0.7), transparent),
        radial-gradient(2px 2px at 30% 50%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 65% 55%, rgba(255,240,200,0.7), transparent),
        radial-gradient(1.5px 1.5px at 80% 65%, rgba(200,220,255,0.8), transparent),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 60% 75%, rgba(255,240,200,0.7), transparent),
        radial-gradient(1px 1px at 75% 85%, rgba(255,255,255,0.8), transparent);
      background-size: 100% 100%;
    }

    /* ========== 方案 B: 银河螺旋带 (CSS conic-gradient) ========== */
    .bg-b {
      background:
        radial-gradient(ellipse 120% 30% at 50% 50%, rgba(100, 140, 255, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 100% 8% at 50% 35%, rgba(180, 160, 220, 0.2) 0%, transparent 100%),
        radial-gradient(ellipse 100% 6% at 50% 65%, rgba(140, 120, 200, 0.15) 0%, transparent 100%),
        #050510;
      animation: bg-b-rotate 120s linear infinite;
    }
    @keyframes bg-b-rotate {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(360deg); }
    }
    /* 密集星空粒子 */
    .bg-b::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(0.8px 0.8px at 5% 8%, white, transparent),
        radial-gradient(0.8px 0.8px at 12% 22%, white, transparent),
        radial-gradient(1.2px 1.2px at 18% 5%, #aaccff, transparent),
        radial-gradient(0.6px 0.6px at 25% 15%, white, transparent),
        radial-gradient(0.8px 0.8px at 33% 28%, white, transparent),
        radial-gradient(1px 1px at 40% 12%, #ffccaa, transparent),
        radial-gradient(0.7px 0.7px at 48% 35%, white, transparent),
        radial-gradient(0.9px 0.9px at 55% 8%, white, transparent),
        radial-gradient(1.1px 1.1px at 62% 25%, #aaaaff, transparent),
        radial-gradient(0.7px 0.7px at 70% 18%, white, transparent),
        radial-gradient(0.8px 0.8px at 78% 32%, white, transparent),
        radial-gradient(1.3px 1.3px at 85% 10%, #ffddcc, transparent),
        radial-gradient(0.6px 0.6px at 92% 40%, white, transparent),
        radial-gradient(0.9px 0.9px at 8% 55%, white, transparent),
        radial-gradient(0.7px 0.7px at 15% 65%, white, transparent),
        radial-gradient(1px 1px at 22% 48%, #ccddff, transparent),
        radial-gradient(0.8px 0.8px at 30% 72%, white, transparent),
        radial-gradient(0.6px 0.6px at 38% 58%, white, transparent),
        radial-gradient(1.2px 1.2px at 45% 68%, #eebbff, transparent),
        radial-gradient(0.7px 0.7px at 52% 52%, white, transparent),
        radial-gradient(0.9px 0.9px at 60% 75%, white, transparent),
        radial-gradient(0.7px 0.7px at 68% 42%, white, transparent),
        radial-gradient(1.1px 1.1px at 75% 62%, #aaccee, transparent),
        radial-gradient(0.8px 0.8px at 82% 55%, white, transparent),
        radial-gradient(0.6px 0.6px at 90% 78%, white, transparent);
    }

    /* ========== 方案 C: 动态极光星云 (CSS animation) ========== */
    .bg-c {
      background: #050510;
    }
    .bg-c::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(0, 200, 255, 0.18), transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(180, 0, 255, 0.15), transparent 60%),
        radial-gradient(ellipse 70% 60% at 60% 40%, rgba(0, 100, 200, 0.12), transparent 55%);
      animation: bg-c-shift 20s ease-in-out infinite alternate;
    }
    .bg-c::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 40% 30% at 70% 50%, rgba(255, 100, 150, 0.12), transparent 50%),
        radial-gradient(ellipse 50% 40% at 30% 60%, rgba(50, 150, 255, 0.15), transparent 55%);
      animation: bg-c-shift2 25s ease-in-out infinite alternate;
    }
    @keyframes bg-c-shift {
      0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
      100% { transform: translate(-5%, 3%) scale(1.1); opacity: 1; }
    }
    @keyframes bg-c-shift2 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
      100% { transform: translate(5%, -2%) scale(1.08); opacity: 1; }
    }

    /* ========== 方案 A+D: 星云渐变 + 深空尘埃带 ========== */
    .bg-ad {
      background:
        /* D: 深空尘埃带 */
        radial-gradient(ellipse 100% 12% at 50% 40%, rgba(100, 130, 200, 0.10) 0%, transparent 100%),
        radial-gradient(ellipse 90% 8% at 50% 55%, rgba(150, 100, 200, 0.08) 0%, transparent 100%),
        radial-gradient(ellipse 80% 5% at 50% 65%, rgba(80, 120, 180, 0.06) 0%, transparent 100%),
        /* 星云斑点 */
        radial-gradient(circle 15% at 25% 30%, rgba(80, 150, 255, 0.10), transparent 70%),
        radial-gradient(circle 12% at 65% 45%, rgba(200, 100, 180, 0.08), transparent 70%),
        radial-gradient(circle 10% at 40% 70%, rgba(100, 180, 255, 0.06), transparent 70%),
        /* A: 多层星云色彩 */
        radial-gradient(ellipse 80% 60% at 30% 20%, rgba(138, 43, 226, 0.20) 0%, transparent 50%),
        radial-gradient(ellipse 60% 50% at 70% 60%, rgba(0, 150, 255, 0.16) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 80%, rgba(255, 0, 128, 0.10) 0%, transparent 50%),
        /* 基底深空 */
        radial-gradient(ellipse 70% 70% at 50% 50%, rgba(30, 20, 80, 0.7) 0%, #050510 100%);
    }
    .bg-ad::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1.2px 1.2px at 10% 15%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 25% 25%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 40% 10%, rgba(200,220,255,0.8), transparent),
        radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.8px 1.8px at 70% 20%, rgba(255,240,200,0.7), transparent),
        radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 15% 60%, rgba(200,200,255,0.6), transparent),
        radial-gradient(2px 2px at 30% 50%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 65% 55%, rgba(255,240,200,0.6), transparent),
        radial-gradient(1.5px 1.5px at 80% 65%, rgba(200,220,255,0.7), transparent),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.6), transparent),
        radial-gradient(0.8px 0.8px at 20% 80%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 45% 85%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.3px 1.3px at 60% 75%, rgba(255,240,200,0.6), transparent),
        radial-gradient(1px 1px at 75% 85%, rgba(255,255,255,0.7), transparent),
        radial-gradient(0.7px 0.7px at 35% 12%, rgba(255,255,255,0.5), transparent),
        radial-gradient(0.9px 0.9px at 5% 72%, rgba(200,200,255,0.6), transparent),
        radial-gradient(1.1px 1.1px at 95% 55%, rgba(255,255,255,0.5), transparent),
        radial-gradient(0.8px 0.8px at 58% 90%, rgba(255,240,200,0.5), transparent);
    }

    /* ========== 方案 D: 深空尘埃带 (三色星云层叠) ========== */
    .bg-d {
      background:
        /* 银河水平带 */
        radial-gradient(ellipse 100% 12% at 50% 40%, rgba(100, 130, 200, 0.12) 0%, transparent 100%),
        radial-gradient(ellipse 90% 8% at 50% 55%, rgba(150, 100, 200, 0.10) 0%, transparent 100%),
        radial-gradient(ellipse 80% 5% at 50% 65%, rgba(80, 120, 180, 0.08) 0%, transparent 100%),
        /* 星云斑点 */
        radial-gradient(circle 15% at 25% 30%, rgba(80, 150, 255, 0.12), transparent 70%),
        radial-gradient(circle 12% at 65% 45%, rgba(200, 100, 180, 0.10), transparent 70%),
        radial-gradient(circle 10% at 40% 70%, rgba(100, 180, 255, 0.08), transparent 70%),
        radial-gradient(circle 18% at 75% 25%, rgba(255, 150, 80, 0.06), transparent 70%),
        /* 基底深空 */
        #050510;
    }
  </style>
</head>
<body>
  <div class="card bg-a">
    <h3>A · 多层星云渐变</h3>
    <p class="desc">紫色+蓝色+粉色三层径向渐变叠加，点缀明亮星点。色彩丰富，静谧深邃。</p>
  </div>
  <div class="card bg-b">
    <h3>B · 银河螺旋带</h3>
    <p class="desc">模拟银河水平盘面效果，含大量彩色微粒星点。缓慢色相旋转，动态而克制。</p>
  </div>
  <div class="card bg-c">
    <h3>C · 动态极光星云</h3>
    <p class="desc">多层次渐变呼吸运动，青蓝+紫红双色交替漂移。类似极光效果，氛围感强。</p>
  </div>
  <div class="card bg-d">
    <h3>D · 深空尘埃带</h3>
    <p class="desc">模拟真实深空：银河水平尘埃带 + 零星星云斑点 + 极暗基底。NASA 风格，低调高级。</p>
  </div>
  <div class="card bg-ad">
    <h3>🌟 A+D · 推荐组合</h3>
    <p class="desc">多层星云色彩叠加在深空尘埃之上，亮星点缀贯穿全局。绚丽而不乱，深邃有层次。</p>
  </div>
  <div class="card" style="background: radial-gradient(ellipse at center, rgba(30,58,138,0.3) 0%, rgba(10,10,26,0.5) 50%, #050510 100%);">
    <h3 style="color:rgba(255,255,255,0.5)">⬅️ 当前背景 (对比)</h3>
    <p class="desc">单层蓝色径向渐变。用作对比参照。</p>
  </div>
</body>
</html>
